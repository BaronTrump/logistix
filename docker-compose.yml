version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: logistix-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: logistix
      POSTGRES_PASSWORD: logistix_dev
      POSTGRES_DB: logistix
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U logistix']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logistix-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://logistix:logistix_dev@postgres:5432/logistix
      NEXTAUTH_SECRET: change-me-in-production
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_CESIUM_ION_TOKEN: ${NEXT_PUBLIC_CESIUM_ION_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
